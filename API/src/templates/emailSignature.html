<table cellpadding="0" cellspacing="0" role="presentation" style="font-family:Arial,sans-serif;color:#0f172a;border-collapse:collapse;">
  <tr>
    <td style="padding:12px 0;border-top:2px solid #0F62FE;">
      <p style="margin:0;font-size:15px;font-weight:700;">{{name}}</p>
      <p style="margin:3px 0 0;font-size:13px;color:#475569;">{{role}}</p>
      <p style="margin:8px 0 0;font-size:12px;color:#64748b;">{{email}}</p>
    </td>
  </tr>
  <tr>
    <td style="padding-top:10px;">
      <p style="margin:0 0 6px;font-size:12px;font-weight:700;color:#16558C;">Badges conquistados</p>
      <div>{{badges}}</div>
    </td>
  </tr>
</table>
